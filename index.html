<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Coloring | 魔法著色板</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="glass-panel header">
            <h1><i class='bx bxs-color-fill'></i> 魔法互動著色板</h1>
            <p>選擇喜愛的色彩，為精美畫作注入繽紛活力！點擊畫面上特定區域即可著色。</p>
        </header>

        <!-- 選擇畫作 (精簡化、無縮圖、最上方) -->
        <div class="glass-panel image-selector-top">
            <button class="img-btn active" data-img="著色版_boy_0.png" id="btn-select-boy">
                <span>小男孩</span>
            </button>
            <button class="img-btn" data-img="著色版_gril_0.png" id="btn-select-girl">
                <span>小女孩</span>
            </button>
        </div>

        <!-- 側邊欄遮罩層 (手機版點擊外側收合用) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <main class="main-content">
            <!-- Left Sidebar: Tools & Palette (桌機側欄 / 手機抽屜) -->
            <aside class="glass-panel sidebar" id="sidebar">
                <!-- 手機版拖曳把手 -->
                <div class="drawer-handle"></div>
                
                <div class="tool-section">
                    <h2>繽紛調色盤</h2>
                    <div class="palette" id="palette">
                        <!-- Colors will be generated by JS -->
                    </div>
                </div>

                <div class="tool-section actions">
                    <button id="btn-undo" class="action-btn" title="復原一步"><i class='bx bx-undo'></i> 復原</button>
                    <button id="btn-reset" class="action-btn" title="恢復原圖"><i class='bx bx-reset'></i> 重置</button>
                    <button id="btn-close-sidebar" class="action-btn secondary" title="收合選單">關閉</button>
                </div>
            </aside>

            <!-- Center: Canvas Area -->
            <section class="glass-panel canvas-wrapper">
                <div class="canvas-container">
                    <canvas id="coloring-canvas"></canvas>
                    <div class="loading-overlay" id="loading">
                        <i class='bx bx-loader-alt bx-spin'></i>
                    </div>
                </div>
            </section>
        </main>

        <!-- 浮動工具箱按鈕 (僅在手機/平板顯示) -->
        <button id="btn-toggle-palette" class="fab-btn">
            <i class='bx bx-palette'></i> <span>工具箱</span>
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="images_base64.js"></script>
    <script src="app.js"></script>
</body>
</html>
