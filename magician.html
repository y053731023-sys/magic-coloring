<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            display: flex;
            align-items: flex-end; /* 將內容對齊到最下方 */
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding-bottom: 5px; /* 距離底部保留一點點微小的空間 */
        }
        
        /* 隱藏所有無關的文字與連線狀態 */
        h1, .status-header, #conn-status {
            display: none;
        }

        .dashboard-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zone-list {
            list-style: none;
            display: flex;
            flex-direction: row; /* 水平排列燈號 */
            gap: 15px; /* 燈泡之間的間距 */
        }

        .zone-item {
            display: flex;
            align-items: center;
        }

        .color-preview {
            width: 8px; /* 極度微小的燈泡 */
            height: 8px;
            border-radius: 50%;
            background-color: #000; /* 預設關燈 */
            transition: all 0.3s ease;
        }

        /* 當有顏色時的發光效果會由 JS 動態加入 */
        .color-preview.on {
            box-shadow: 0 0 12px var(--light-color), 0 0 24px var(--light-color);
        }
        
        .no-data {
            display: none; /* 隱藏等待中文字 */
        }
    </style>
</head>
<body>

    <h1 id="current-image"></h1>
    <div id="conn-status"></div>
    
    <div class="dashboard-container">
        <ul class="zone-list" id="zone-list">
            <!-- JS 動態產生燈號 -->
        </ul>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="magician.js?v=5"></script>
</body>
</html>
