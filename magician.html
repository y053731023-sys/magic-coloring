<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magician Dashboard | 魔法後台</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }
        body {
            background-color: #111;
            color: #FFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 2rem;
        }
        h1 {
            color: #FF5E62;
            margin-bottom: 2rem;
            text-align: center;
        }
        .dashboard-container {
            width: 100%;
            max-width: 600px;
            background: #222;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .status-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #333;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .current-image {
            font-size: 1.5rem;
            font-weight: 600;
            color: #FECB3E;
        }
        .zone-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .zone-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.2rem;
        }
        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #FFF;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .zone-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .no-data {
            text-align: center;
            color: #888;
            font-size: 1.2rem;
            padding: 2rem;
        }
        .connection-status {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #0f0;
        }
    </style>
</head>
<body>

    <h1>🎩 Magician Dashboard</h1>
    
    <div class="dashboard-container">
        <div class="status-header">
            <span>目前畫作：</span>
            <span class="current-image" id="current-image">等待連線...</span>
        </div>
        <ul class="zone-list" id="zone-list">
            <div class="no-data">等待觀眾開始著色...</div>
        </ul>
    </div>
    
    <div class="connection-status" id="conn-status">🟡 初始化 Firebase...</div>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="magician.js?v=2"></script>
</body>
</html>
